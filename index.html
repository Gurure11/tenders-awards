<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Project Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

.header {
    background: linear-gradient(90deg,#0ea5e9,#6366f1);
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: none;
    width: 180px;
}

button {
    padding: 8px 12px;
    background: #22c55e;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table th, .table td {
    border: 1px solid #334155;
    padding: 8px;
}
</style>
</head>

<body>

<div class="header">Project Management Dashboard</div>

<div class="container">

<div class="card">
<h3>Add Revenue</h3>

<input type="date" id="date">
<input type="text" id="manager" placeholder="Manager">

<select id="projectSelect">
<option value="">Select Project</option>
</select>

<input type="text" id="newProject" placeholder="New Project">
<button onclick="addProject()">Add Project</button>

<input type="number" id="amount" placeholder="Amount">

<input type="number" id="budget" placeholder="Budget">
<button onclick="saveBudget()">Save Budget</button>

<br><br>
<button onclick="submitRevenue()">Submit Revenue</button>

</div>

<div class="card">
<h3>Revenue Table</h3>
<table class="table" id="table">
<thead>
<tr>
<th>Date</th>
<th>Manager</th>
<th>Project</th>
<th>Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby11Bv0BrffYRyVaccJmM8cluQB-W2W-7HQYSVWx1IHOzB7dXgMiPwxljdH0Yi2BUDd/exec";

// Load data
function loadData(){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({action:"getAllData"})
})
.then(res=>res.json())
.then(data=>{
const revenue=data.data.revenue;
const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

revenue.slice(1).forEach(r=>{
let row=`<tr>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
</tr>`;
tbody.innerHTML+=row;
});
});
}

// Add Project dynamically
function addProject(){
let name=document.getElementById("newProject").value;
if(!name) return alert("Enter project name");

let select=document.getElementById("projectSelect");
let option=document.createElement("option");

option.value=name;
option.text=name;

select.add(option);
select.value=name;

document.getElementById("newProject").value="";
}

// Save budget locally
function saveBudget(){
let project=document.getElementById("projectSelect").value;
let budget=document.getElementById("budget").value;

if(!project) return alert("Select project");
if(!budget) return alert("Enter budget");

let budgets=JSON.parse(localStorage.getItem("budgets")||"{}");
budgets[project]=budget;

localStorage.setItem("budgets",JSON.stringify(budgets));

alert("Budget saved");
}

// Submit revenue
function submitRevenue(){

let payload={
date:document.getElementById("date").value,
manager:document.getElementById("manager").value,
projectName:document.getElementById("projectSelect").value,
amount:document.getElementById("amount").value
};

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"addRevenue",
payload:payload
})
})
.then(res=>res.json())
.then(res=>{
alert("Saved");
loadData();
});
}

// Init
loadData();

</script>

</body>
</html>
